<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Hub</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f0f0f;color:white;}
header{background:#1a1a1a;padding:30px;text-align:center;}
h1{margin:0;font-size:40px;}
.container{max-width:1000px;margin:auto;padding:25px;}
.card{background:#1c1c1c;padding:20px;margin:15px 0;border-radius:10px;}
h2{border-left:4px solid #00ff88;padding-left:10px;}
.button{display:inline-block;padding:10px 14px;margin:5px;background:#00ff88;color:black;font-weight:bold;border:none;border-radius:8px;cursor:pointer;}
.button:hover{background:#00cc6a;}
.output{background:#111;padding:15px;border-radius:10px;margin-bottom:15px;font-family:monospace;}
</style>

<script>
let reasons = [];
let severity = "warn";

function addReason(type, reason){
    reasons.push(reason);

    if(type === "ban") severity = "ban";
    else if(type === "kick" && severity !== "ban") severity = "kick";

    updateOutput();
}

function updateOutput(){
    let user = document.getElementById("user").value || "User";
    let text = `:log ${severity.toUpperCase()} ${user} - ${reasons.join(", ")}`;
    document.getElementById("output").innerText = text;
}

function copyLog(){
    let text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied: " + text);
}

function resetLog(){
    reasons = [];
    severity = "warn";
    updateOutput();
}
</script>

</head>
<body>

<header>
    <h1>Staff Hub</h1>
</header>

<div class="container">

<div class="card">
<h2>🧾 Log Builder</h2>
<input id="user" placeholder="Enter Username" style="padding:8px;border-radius:6px;border:none;margin-bottom:10px;">
<div id="output" class="output">:log WARN User - </div>
<button class="button" onclick="copyLog()">Copy</button>
<button class="button" onclick="resetLog()">Reset</button>
</div>

<div class="card">
<h2>⚠️ Warn</h2>
<button class="button" onclick="addReason('warn','RDM')">RDM</button>
<button class="button" onclick="addReason('warn','VDM')">VDM</button>
<button class="button" onclick="addReason('warn','FRP')">FRP</button>
<button class="button" onclick="addReason('warn','NLR')">NLR</button>
</div>

<div class="card">
<h2>⛔ Kick</h2>
<button class="button" onclick="addReason('kick','Staff Disrespect')">Staff Disrespect</button>
<button class="button" onclick="addReason('kick','Tool Abuse')">Tool Abuse</button>
</div>

<div class="card">
<h2>🔴 Ban</h2>
<button class="button" onclick="addReason('ban','Exploiting')">Exploiting</button>
<button class="button" onclick="addReason('ban','LTAP')">LTAP</button>
</div>

</div>

</body>
</html>
